<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Вхід</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
      body{
        background: #e5e5e5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .card{
        border-radius: 20px;
        border: none;
        box-shadow: 0 20px 60px rgba(0,0,0,.2);
        backdrop-filter: blur(10px);
        background: rgba(255,255,255,.95);
      }
      .btn-primary{
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        transition: transform .2s;
      }
      .btn-primary:hover{
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(102,126,234,.4);
      }
      .form-control:focus{
        border-color: #667eea;
        box-shadow: 0 0 0 .2rem rgba(102,126,234,.25);
      }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-11">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                        <h4 class="mt-3 text-dark">Вхід адміністратора</h4>
                        <p class="text-muted small">Введіть номер телефону для отримання коду в Telegram</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} text-center">
                                <i class="bi {% if category=='success' %}bi-check-circle-fill{% elif category=='danger' %}bi-exclamation-triangle-fill{% else %}bi-info-circle-fill{% endif %} me-1"></i>
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endwith %}

                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Номер телефону</label>
                            <input type="text" name="phone" class="form-control" required placeholder="380667289321 або 0667289321">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Увійти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
