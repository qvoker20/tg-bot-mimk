<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Вхід</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
      body{
        background: #f4f6fb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #1f2937;
      }
      .card{
        border-radius: 16px;
        border: 1px solid #e7ecf3;
        box-shadow: 0 14px 30px rgba(15, 23, 42, .08);
        background: #fff;
      }
      .btn-primary{
        background: #2f58b7;
        border-color: #2f58b7;
      }
      .btn-primary:hover{
        background: #274aa0;
        border-color: #274aa0;
      }
      .form-control:focus{
        border-color: #4a70c8;
        box-shadow: 0 0 0 .2rem rgba(74, 112, 200, .15);
      }
      .auth-shell{
        width: 100%;
        max-width: 480px;
        padding: 1rem;
      }
    </style>
</head>
<body>

<div class="auth-shell">
    <div class="row justify-content-center">
        <div class="col-12">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                        <h4 class="mt-3 text-dark">Вхід адміністратора</h4>
                        <p class="text-muted small">Введіть номер телефону для отримання коду в Telegram</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} text-center">
                                <i class="bi {% if category=='success' %}bi-check-circle-fill{% elif category=='danger' %}bi-exclamation-triangle-fill{% else %}bi-info-circle-fill{% endif %} me-1"></i>
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endwith %}

                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Номер телефону</label>
                        <input id="phoneInput" type="tel" name="phone" class="form-control" required placeholder="XXXXXXXXX" value="+380" maxlength="13" pattern="\+380\d{9}">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Увійти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
  (function () {
    const phoneInput = document.getElementById('phoneInput');
    if (!phoneInput) return;

    const PREFIX = '+380';

    function normalize(value) {
      let digits = String(value || '').replace(/\D/g, '');
      if (digits.startsWith('380')) {
        digits = digits.slice(3);
      } else if (digits.startsWith('0')) {
        digits = digits.slice(1);
      }
      return PREFIX + digits.slice(0, 9);
    }

    phoneInput.addEventListener('focus', () => {
      if (!phoneInput.value.startsWith(PREFIX)) {
        phoneInput.value = PREFIX;
      }
      setTimeout(() => phoneInput.setSelectionRange(phoneInput.value.length, phoneInput.value.length), 0);
    });

    phoneInput.addEventListener('input', () => {
      phoneInput.value = normalize(phoneInput.value);
    });

    phoneInput.addEventListener('keydown', (e) => {
      const start = phoneInput.selectionStart || 0;
      const end = phoneInput.selectionEnd || 0;
      const isDelete = e.key === 'Backspace' || e.key === 'Delete';

      if (isDelete && start <= PREFIX.length) {
        e.preventDefault();
        phoneInput.setSelectionRange(PREFIX.length, PREFIX.length);
      }

      if (start < PREFIX.length && end < PREFIX.length && e.key.length === 1) {
        e.preventDefault();
        phoneInput.setSelectionRange(PREFIX.length, PREFIX.length);
      }
    });

    phoneInput.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      phoneInput.value = normalize(text);
    });
  })();
</script>

</body>
</html>
