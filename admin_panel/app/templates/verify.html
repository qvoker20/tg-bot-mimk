<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Підтвердження</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
      body{
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .card{
        border-radius: 20px;
        border: none;
        box-shadow: 0 20px 60px rgba(0,0,0,.2);
        backdrop-filter: blur(10px);
        background: rgba(255,255,255,.95);
      }
      .btn-success{
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        border: none;
        transition: transform .2s;
      }
      .btn-success:hover{
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(79,172,254,.4);
      }
      .form-control:focus{
        border-color: #4facfe;
        box-shadow: 0 0 0 .2rem rgba(79,172,254,.25);
      }
      .form-check-input:checked{
        background-color: #4facfe;
        border-color: #4facfe;
      }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-11">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-key-fill text-primary" style="font-size: 3rem;"></i>
                        <h5 class="mt-3 text-dark">Підтвердження входу</h5>
                        <p class="text-muted small">Введіть 6-значний код з Telegram</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} text-center">
                                <i class="bi {% if category=='success' %}bi-check-circle-fill{% elif category=='danger' %}bi-exclamation-triangle-fill{% else %}bi-info-circle-fill{% endif %} me-1"></i>
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endwith %}

                    <form method="post">
                        <div class="mb-3">
                            <input type="text"
                                   name="code"
                                   class="form-control form-control-lg text-center"
                                   placeholder="000000"
                                   maxlength="6"
                                   required
                                   style="font-size: 1.5rem; letter-spacing: .5rem;">
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="remember" id="remember">
                            <label class="form-check-label text-muted" for="remember">
                                Запам'ятати мене (не виходити 30 днів)
                            </label>
                        </div>

                        <button class="btn btn-success btn-lg w-100">
                            <i class="bi bi-check-circle-fill me-2"></i>Увійти
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
