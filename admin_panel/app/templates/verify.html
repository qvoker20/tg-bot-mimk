<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Підтвердження</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
      body{
                background: #f4f6fb;
        min-height: 100vh;
        display: flex;
        align-items: center;
                justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                color: #1f2937;
      }
      .card{
                border-radius: 16px;
                border: 1px solid #e7ecf3;
                box-shadow: 0 14px 30px rgba(15, 23, 42, .08);
                background: #fff;
      }
      .btn-success{
                background: #0f9c6a;
                border-color: #0f9c6a;
      }
      .btn-success:hover{
                background: #0c855a;
                border-color: #0c855a;
      }
      .form-control:focus{
                border-color: #4a70c8;
                box-shadow: 0 0 0 .2rem rgba(74, 112, 200, .15);
      }
      .form-check-input:checked{
                background-color: #2f58b7;
                border-color: #2f58b7;
            }
            .auth-shell{
                width: 100%;
                max-width: 480px;
                padding: 1rem;
      }
    </style>
</head>
<body>

<div class="auth-shell">
        <div class="row justify-content-center">
                <div class="col-12">
            <div class="card shadow">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-key-fill text-primary" style="font-size: 3rem;"></i>
                        <h5 class="mt-3 text-dark">Підтвердження входу</h5>
                        <p class="text-muted small">Введіть 6-значний код з Telegram</p>
                    </div>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} text-center">
                                <i class="bi {% if category=='success' %}bi-check-circle-fill{% elif category=='danger' %}bi-exclamation-triangle-fill{% else %}bi-info-circle-fill{% endif %} me-1"></i>
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endwith %}

                    <form method="post">
                        <div class="mb-3">
                            <input type="text"
                                   name="code"
                                   class="form-control form-control-lg text-center"
                                   placeholder="000000"
                                   maxlength="6"
                                   required
                                   style="font-size: 1.5rem; letter-spacing: .5rem;">
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="remember" id="remember">
                            <label class="form-check-label text-muted" for="remember">
                                Запам'ятати мене (не виходити 30 днів)
                            </label>
                        </div>

                        <button class="btn btn-success btn-lg w-100">
                            <i class="bi bi-check-circle-fill me-2"></i>Увійти
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
