<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Робітники — МІМК HUB</title>
  <link rel="icon" type="image/png" href="/static/branding/hub-favicon.png?v=2">
  <link rel="shortcut icon" href="/favicon.ico?v=2">
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="navbar-title nav-home-link"><img src="/branding-logo?v=3" alt="МІМК HUB" class="brand-logo">МІМК HUB — Робітники</a>
    <div class="navbar-right">
      <a href="/" class="nav-btn">
        <span class="material-icons-round" style="font-size:16px">arrow_back</span>
        Головна
      </a>
      <a href="/profile" class="nav-btn">
        <span class="material-icons-round" style="font-size:16px">person</span>
        <span id="navProfileName">Профіль</span>
      </a>
    </div>
  </nav>

  <div class="container">
    <h2 class="section-title">Робітники компанії</h2>
    <div class="workers-filters">
      <div class="search-input-wrap workers-search-wrap">
        <span class="material-icons-round search-icon">search</span>
        <input id="workersSearch" placeholder="Пошук: ім'я, телефон або посада (@username)" />
      </div>
      <select id="workersPositionFilter">
        <option value="">Всі посади</option>
      </select>
    </div>
    <div id="workersCards" class="workers-cards-grid"></div>
    <div id="workersEmpty" class="workers-empty workers-empty-block hidden">Нічого не знайдено</div>
    <div class="workers-list-wrap" id="workersListWrap">
      <div id="workersCardsList" class="workers-cards-list"></div>
    </div>
  </div>

  <script src="/static/ui.js"></script>
  <script src="/static/workers.js"></script>
</body>
</html>
