<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профіль — МІМК HUB</title>
  <link rel="icon" type="image/png" href="/static/branding/hub-favicon.png?v=2">
  <link rel="shortcut icon" href="/favicon.ico?v=2">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="/" class="navbar-title nav-home-link"><img src="/branding-logo?v=3" alt="МІМК HUB" class="brand-logo">МІМК HUB</a>
    <div class="navbar-right">
      <a href="/" class="nav-btn">
        <span class="material-icons-round" style="font-size:16px">arrow_back</span>
        Головна
      </a>
      <a href="/workers" class="nav-btn">
        <span class="material-icons-round" style="font-size:16px">groups</span>
        Робітники
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="profile-card">

      <!-- АВАТАР -->
      <div class="profile-avatar">
        <img id="profileAvatarImg" class="profile-avatar-img hidden" src="" alt="Аватар" />
        <span id="avatarLetter">?</span>
      </div>

      <div class="profile-field">
        <label><span class="material-icons-round" style="font-size:14px">photo_camera</span> Фото профілю</label>
        <div class="profile-photo-row">
          <input id="profileAvatar" type="file" accept="image/*" />
          <button id="saveAvatarBtn" type="button"><span class="material-icons-round" style="font-size:16px">upload</span></button>
        </div>
      </div>

      <!-- ІМ'Я (редагується) -->
      <div class="profile-field">
        <label><span class="material-icons-round" style="font-size:14px">person</span> Ім'я</label>
        <div class="profile-edit-row">
          <input id="profileName" type="text" placeholder="Ім'я" />
          <button id="saveNameBtn"><span class="material-icons-round" style="font-size:16px">save</span></button>
        </div>
      </div>

      <!-- ТЕЛЕФОН (тільки читання) -->
      <div class="profile-field">
        <label><span class="material-icons-round" style="font-size:14px">phone</span> Телефон</label>
        <div class="profile-readonly">
          <span id="profilePhone">—</span>
          <span class="readonly-hint">Не редагується</span>
        </div>
      </div>

      <!-- USERNAME (тільки читання) -->
      <div class="profile-field">
        <label><span class="material-icons-round" style="font-size:14px">alternate_email</span> Username</label>
        <div class="profile-readonly">
          <span id="profileUsername">—</span>
          <span class="readonly-hint">Не редагується</span>
        </div>
      </div>

      <!-- РОЛЬ (тільки читання) -->
      <div class="profile-field">
        <label><span class="material-icons-round" style="font-size:14px">shield</span> Роль</label>
        <div class="profile-readonly">
          <span id="profileRole">—</span>
          <span class="readonly-hint">Не редагується</span>
        </div>
      </div>

      <!-- ВИЙТИ -->
      <button id="logoutBtn" class="logout-btn">
        <span class="material-icons-round" style="font-size:18px">logout</span>
        Вийти
      </button>

    </div>
  </div>

  <div id="avatarCropModal" class="modal hidden">
    <div class="modal-content modal-wide">
      <h3>Обрізати фото профілю</h3>
      <div class="avatar-crop-wrap">
        <img id="avatarCropImage" src="" alt="Crop avatar" />
      </div>
      <div class="modal-actions">
        <button type="button" id="saveAvatarCropBtn">Застосувати</button>
        <button type="button" id="closeAvatarCropBtn">Скасувати</button>
      </div>
    </div>
  </div>

  <script src="/static/ui.js"></script>
  <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
  <script src="/static/profile.js"></script>
</body>
</html>
